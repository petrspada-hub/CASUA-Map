<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="images/icon.png">
  <link rel="shortcut icon" href="images/icon.png">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">

  <!-- CSS – relativní cesty -->
  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/leaflet-search.css">
  <link rel="stylesheet" href="css/leaflet.photon.css">
  <link rel="stylesheet" href="css/leaflet-measure.css">

  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    .leaflet-popup-content { margin: 0; }

    /* ===== POPUP ===== */
    .casua-popup {
      width: 420px;
      height: 500px;
      overflow-y: auto;
      padding: 15px;
      box-sizing: border-box;
    }
    .casua-popup img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    /* ===== TLAČÍTKO FILTRU VPRAVO NAHOŘE ===== */
    .filter-toggle-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 10000;
      width: 42px;
      height: 42px;
      background: white;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .filter-toggle-btn img { width: 26px; height: 26px; display: block; }

    /* ===== VYSOUVACÍ OKNO FILTRU ===== */
    .filter-window {
      position: absolute;
      top: 65px;
      right: 15px;
      width: 260px;
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      z-index: 9999;
      display: none; /* skryté, dokud není .open */
    }
    .filter-window.open { display: block; }

    .filter-window select,
    .filter-window input {
      width: 100%;
      margin-bottom: 6px;
      padding: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }

    /* Řádek s vyhledáváním + křížek */
    .search-row { position: relative; }
    #searchText { padding-right: 28px; }
    .clear-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      line-height: 20px;
      text-align: center;
      border: none;
      background: #f0f0f0;
      border-radius: 11px;
      cursor: pointer;
      font-size: 16px;
      color: #333;
      padding: 0;
    }
    .clear-btn:hover { background: #e0e0e0; }

    /* Tlačítka ve filtru */
    .filter-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .btn {
      flex: 1;
      font-size: 13px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fafafa;
      cursor: pointer;
    }
    .btn:hover { background: #f0f0f0; }
    .btn.secondary { background: #fff; }
  </style>

  <title>CASUA Map</title>
</head>
<body>
  <div id="map"></div>

  <!-- TLAČÍTKO FILTRU -->
  <div class="filter-toggle-btn" id="filterToggle" title="Filtry">
    <img src="images/filter-icon.png" alt="Filtr">
  </div>

  <!-- OKNO S FILTRY -->
  <div class="filter-window" id="filterWindow" aria-hidden="true">
    <select id="filterTypologie">
      <option value="">Typologie – vše</option>
    </select>

    <select id="filterStav">
      <option value="">Stav – vše</option>
    </select>

    <div class="search-row">
      <input type="text" id="searchText" placeholder="Hledat název / kód" autocomplete="off">
      <button type="button" id="clearSearch" class="clear-btn" title="Vymazat">×</button>
    </div>

    <div class="filter-actions">
      <button type="button" id="resetFilters" class="btn">Vymazat filtr</button>
      <button type="button" id="closeFilters" class="btn secondary">Zavřít</button>
    </div>
  </div>

  <!-- JS – relativní cesty -->
  <script src="js/leaflet.js"></script>
  <script src="js/leaflet-search.js"></script>

  <script>
    /* ===== PARAMETRY ===== */
    const POPUP_WIDTH = 420;
    const POPUP_HEIGHT = 500;
    const IMAGE_MAX_HEIGHT = 260;
    const PIN_SIZE = 90;

    /* ===== MAPA ===== */
    var map = L.map('map', { maxZoom: 19, minZoom: 3 })
      .fitBounds([[50.06315,14.40062],[50.14089,14.50308]]); // počáteční rozsah

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxNativeZoom: 19,
      maxZoom: 19        // dle poskytovatele; mapu ale limituješ přes map.maxZoom = 18
    }).addTo(map);

    /* ===== LOGO ===== */
    const logoControl = L.control({ position: 'bottomleft' });
    logoControl.onAdd = function () {
      const div = L.DomUtil.create('div');
      div.innerHTML = '<img src="images/logo.png" alt="Logo" style="width:140px; margin-left:-20px; margin-bottom:-25px;">';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    logoControl.addTo(map);

    /* ===== IKONY ===== */
    const ICON_FILES = {
      'bydleni': 'pin_bydleni.png',
      'administrativa': 'pin_administrativa.png',
      'kultura': 'pin_kultura.png',
      'zdravotnictvi': 'pin_zdravotnictvi.png',
      'ostatni': 'pin_ostatni.png',
      'polyfunkce': 'pin_polyfunkce.png',
      'prumysl': 'pin_prumysl.png',
      'urbanismus': 'pin_urbanismus.png',
      'vzdelavani': 'pin_vzdelavani.png',
      'interier': 'pin_interier.png',
      'doprava': 'pin_doprava.png'
    };
    const TYPO_TO_KEY = {
      'Bydlení': 'bydleni',
      'Administrativa': 'administrativa',
      'Kultura': 'kultura',
      'Zdravotnictví': 'zdravotnictvi',
      'Ostatní': 'ostatni',
      'Polyfunkce': 'polyfunkce',
      'Průmysl': 'prumysl',
      'Urbanismus a veřejný prostor': 'urbanismus',
      'Vzdělávání': 'vzdelavani',
      'Interiér': 'interier',
      'Doprava': 'doprava'
    };
    function getIconByTypologie(typologie) {
      const key = TYPO_TO_KEY[typologie] || 'ostatni';
      return L.icon({
        iconUrl: 'icons/' + ICON_FILES[key],
        iconSize: [PIN_SIZE, PIN_SIZE],
        iconAnchor: [PIN_SIZE/2, PIN_SIZE/2],
        popupAnchor: [0, -(PIN_SIZE*0.35)]
      });
    }

    /* ===== POPUP ===== */
    function createCasuaPopup(p) {
      function field(label, value) { return !value ? "" : `<div style="margin:4px 0;"><strong>${label}:</strong> ${value}</div>`; }
      const fotoHtml = p["Obrázek"] ? `<img src="${p["Obrázek"]}" alt="">` : "";
      const popis = p["Popis"] ? p["Popis"].replace(/\n/g,"<br>") : "";
      return `
        <div class="casua-popup">
          <h2 style="margin:0 0 10px 0;">${p["Název projektu"] || ""}</h2>
          ${fotoHtml}
          ${field("Kód projektu", p["Kód projektu"])}
          ${field("Lokace", p["Lokace"])}
          ${field("Typologie", p["Typologie"])}
          ${field("Stav", p["Stav"])}
          ${field("Investor", p["Investor"])}
          ${field("Tým", p["Team"])}
          ${field("Zahájení", p["Zahájení"])}
          ${field("Dokončení", p["Dokončení"])}
          ${popis ? `<p style="margin-top:10px;"><strong>Popis:</strong><br>${popis}</p>` : ""}
        </div>`;
    }

    /* ===== Pomocná funkce – normalizace bez diakritiky + lowercase ===== */
    function normalizeStr(str) {
      return (str || "")
        .toString()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '') // odstranění diakritiky
        .toLowerCase();
    }

    /* ===== DATA + FILTRY ===== */
    fetch('../data/projekty.geojson?cb=' + Date.now())
      .then(r => r.json())
      .then(geojson => {
        let allFeatures = geojson.features;
        let geoLayer;
        let didFitOnce = false; // fit na data pouze jednou po načtení

        function renderLayer(features) {
          if (geoLayer) map.removeLayer(geoLayer);
          geoLayer = L.geoJSON(
            { type: "FeatureCollection", features },
            {
              pointToLayer: (feature, latlng) => L.marker(latlng, {
                icon: getIconByTypologie(feature.properties?.["Typologie"])
              }),
              onEachFeature: (feature, layer) => {
                if (feature.properties) {
                  layer.bindPopup(createCasuaPopup(feature.properties), { maxWidth: POPUP_WIDTH + 40 });
                }
              }
            }
          ).addTo(map);

          // Přizpůsob rozsah jen jednou na začátku
          if (!didFitOnce) {
            try { map.fitBounds(geoLayer.getBounds(), { padding: [10,10] }); } catch(e) {}
            didFitOnce = true;
          }
        }

        renderLayer(allFeatures);

        // --- Prvky UI filtru ---
        const typSelect    = document.getElementById("filterTypologie");
        const stavSelect   = document.getElementById("filterStav");
        const searchInput  = document.getElementById("searchText");
        const clearBtn     = document.getElementById("clearSearch");
        const resetBtn     = document.getElementById("resetFilters");
        const closeBtn     = document.getElementById("closeFilters");

        // Naplnění hodnot do selectů
        const typSet = new Set();
        const stavSet = new Set();
        allFeatures.forEach(f => {
          if (f.properties?.["Typologie"]) typSet.add(f.properties["Typologie"]);
          if (f.properties?.["Stav"])      stavSet.add(f.properties["Stav"]);
        });
        [...typSet].sort().forEach(t => { typSelect.innerHTML += `<option value="${t}">${t}</option>`; });
        [...stavSet].sort().forEach(s => { stavSelect.innerHTML += `<option value="${s}">${s}</option>`; });

        function applyFilter() {
          const typVal = typSelect.value;
          const stavVal = stavSelect.value;
          const searchVal = normalizeStr(searchInput.value);

          const filtered = allFeatures.filter(f => {
            const p = f.properties || {};
            const matchTyp  = !typVal  || p["Typologie"] === typVal;
            const matchStav = !stavVal || p["Stav"] === stavVal;
            const text = (normalizeStr(p["Název projektu"]) + " " + normalizeStr(p["Kód projektu"])).trim();
            const matchSearch = !searchVal || text.includes(searchVal);
            return matchTyp && matchStav && matchSearch;
          });

          // Překreslit vrstvy bez změny zoomu
          renderLayer(filtered);
        }

        // Eventy filtrů
        typSelect.addEventListener("change", applyFilter);
        stavSelect.addEventListener("change", applyFilter);
        searchInput.addEventListener("input", applyFilter);

        // Křížek na vymazání vyhledávání
        clearBtn.addEventListener("click", () => {
          if (searchInput.value !== "") {
            searchInput.value = "";
            applyFilter();
            searchInput.focus();
          }
        });

        // === TLAČÍTKO „VYMAZAT FILTR“ (reset všeho) ===
        resetBtn.addEventListener("click", () => {
          typSelect.value = "";
          stavSelect.value = "";
          searchInput.value = "";
          applyFilter();              // pouze překreslí (zoom se nemění)
          searchInput.focus();
        });

        // Volitelné „Zavřít“ okno (čistě UI)
        closeBtn.addEventListener("click", () => {
          filterWindow.classList.remove("open");
          filterWindow.setAttribute("aria-hidden", "true");
        });
      })
      .catch(err => console.error(err));

    /* ===== OVLÁDÁNÍ VYSOUVACÍHO OKNA FILTRU ===== */
    const filterToggle = document.getElementById("filterToggle");
    const filterWindow = document.getElementById("filterWindow");

    // Pouze přepínání tlačítkem (žádné zavírání klikem mimo)
    filterToggle.addEventListener("click", () => {
      const open = filterWindow.classList.toggle("open");
      filterWindow.setAttribute("aria-hidden", open ? "false" : "true");
    });
  </script>
</body>
</html>
