<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">

  <!-- CSS -->
  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/leaflet-search.css">
  <link rel="stylesheet" href="css/leaflet.photon.css">
  <link rel="stylesheet" href="css/leaflet-measure.css">

  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    .leaflet-popup-content { margin: 0; }

    /* ===== POPUP ===== */
    .casua-popup {
      width: 420px;
      height: 500px;
      overflow-y: auto;
      padding: 15px;
      box-sizing: border-box;
    }
    .casua-popup img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    /* ===== TLAČÍTKO FILTRU ===== */
    .filter-toggle-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 10000;
      width: 42px;
      height: 42px;
      background: white;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .filter-toggle-btn img { width: 26px; height: 26px; display: block; }

    /* ===== OKNO FILTRŮ ===== */
    .filter-window {
      position: absolute;
      top: 65px;
      right: 15px;
      width: 260px;
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      z-index: 9999;
      display: none;
    }
    .filter-window.open { display: block; }

    .filter-window select,
    .filter-window input {
      width: 100%;
      margin-bottom: 6px;
      padding: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }

    /* ===== Vyhledávání + křížek ===== */
    .search-row { position: relative; }
    #searchText { padding-right: 28px; }
    .clear-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      border: none;
      background: #eee;
      border-radius: 11px;
      cursor: pointer;
      font-size: 16px;
      line-height: 20px;
      text-align: center;
    }

    /* ===== Tlačítka uvnitř filtru ===== */
    .filter-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .btn {
      flex: 1;
      font-size: 13px;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fafafa;
      cursor: pointer;
    }
    .btn.secondary { background: #fff; }
  </style>

  <title>CASUA Map</title>
</head>
<body>
  <div id="map"></div>

  <!-- TLAČÍTKO FILTRŮ -->
  <div class="filter-toggle-btn" id="filterToggle">
    <img src="images/filter-icon.png">
  </div>

  <!-- OKNO FILTRŮ -->
  <div class="filter-window" id="filterWindow">
    <select id="filterTypologie">
      <option value="">Typologie – vše</option>
    </select>

    <select id="filterStav">
      <option value="">Stav – vše</option>
    </select>

    <div class="search-row">
      <input id="searchText" type="text" placeholder="Hledat název / kód">
      <button id="clearSearch" class="clear-btn">×</button>
    </div>

    <div class="filter-actions">
      <button id="resetFilters" class="btn">Vymazat filtr</button>
      <button id="closeFilters" class="btn secondary">Zavřít</button>
    </div>
  </div>

  <!-- JS -->
  <script src="js/leaflet.js"></script>
  <script src="js/leaflet-search.js"></script>

  <script>

    /* ============================================
       MAPA – omezení zoomu
    ============================================ */

    var map = L.map('map', {
      minZoom: 10,
      maxZoom: 18
    });


    /* ============================================
       Podklady
    ============================================ */
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    /* ============================================
       LOGO
    ============================================ */

    const logo = L.control({ position:'bottomleft' });
    logo.onAdd = () => {
      const d = L.DomUtil.create('div');
      d.innerHTML = '<img src="images/logo.png" style="width:140px">';
      return d;
    };
    logo.addTo(map);


    /* ============================================
       IKONY
    ============================================ */

    const ICON_FILES = {
      bydleni:'pin_bydleni.png',
      administrativa:'pin_administrativa.png',
      kultura:'pin_kultura.png',
      zdravotnictvi:'pin_zdravotnictvi.png',
      ostatni:'pin_ostatni.png',
      polyfunkce:'pin_polyfunkce.png',
      prumysl:'pin_prumysl.png',
      urbanismus:'pin_urbanismus.png',
      vzdelavani:'pin_vzdelavani.png'
    };

    const TYPO_TO_KEY = {
      'Bydlení':'bydleni',
      'Administrativa':'administrativa',
      'Kultura':'kultura',
      'Zdravotnictví':'zdravotnictvi',
      'Ostatní':'ostatni',
      'Polyfunkce':'polyfunkce',
      'Průmysl':'prumysl',
      'Urbanismus a veřejný prostor':'urbanismus',
      'Vzdělávání':'vzdelavani'
    };

    function getIcon(typ) {
      const key = TYPO_TO_KEY[typ] || 'ostatni';
      return L.icon({
        iconUrl:'icons/' + ICON_FILES[key],
        iconSize:[90,90],
        iconAnchor:[45,45],
        popupAnchor:[0,-30]
      });
    }


    /* ============================================
       POPUP
    ============================================ */

    function popup(p){
      function f(lbl,val){
        return val ? `<div><strong>${lbl}:</strong> ${val}</div>` : '';
      }
      const img = p["Obrázek"] ? `${p[` : "";
      const popis = p["Popis"] ? p["Popis"].replace(/\n/g,"<br>") : "";
      return `
        <div class="casua-popup">
          <h2>${p['Název projektu']||''}</h2>
          ${img}
          ${f("Kód projektu",p["Kód projektu"])}
          ${f("Lokace",p["Lokace"])}
          ${f("Typologie",p["Typologie"])}
          ${f("Stav",p["Stav"])}
          ${f("Investor",p["Investor"])}
          ${f("Tým",p["Team"])}
          ${f("Zahájení",p["Zahájení"])}
          ${f("Dokončení",p["Dokončení"])}
          ${popis?`<p><strong>Popis:</strong><br>${popis}</p>`:""}
        </div>`;
    }


    /* ============================================
       NORMALIZACE TEXTU BEZ DIAKRITIKY
    ============================================ */

    function norm(str){
      return (str||"")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .toLowerCase();
    }


    /* ============================================
       NAČTENÍ DAT
    ============================================ */

    fetch('../data/projekty.geojson?cb='+Date.now())
      .then(r=>r.json())
      .then(geo=>{
        const all = geo.features;
        let layer;
        let allBounds = null;

        function draw(features){
          if(layer) map.removeLayer(layer);
          layer = L.geoJSON(
            {type:"FeatureCollection",features},
            {
              pointToLayer:(f,ll)=>L.marker(ll,{icon:getIcon(f.properties?.Typologie)}),
              onEachFeature:(f,l)=>l.bindPopup(popup(f.properties))
            }
          ).addTo(map);
        }

        // první render
        draw(all);

        // ====== automatické maximální hranice mapy ======
        try {
          allBounds = layer.getBounds().pad(0.05);
          map.fitBounds(allBounds);
          map.setMaxBounds(allBounds);
          map.options.maxBoundsViscosity = 1.0;
        } catch(e){}

        // ====== selecty ======
        const tSel = document.getElementById("filterTypologie");
        const sSel = document.getElementById("filterStav");
        const txt  = document.getElementById("searchText");
        const clr  = document.getElementById("clearSearch");
        const rst  = document.getElementById("resetFilters");
        const cls  = document.getElementById("closeFilters");

        [...new Set(all.map(f=>f.properties?.Typologie))].filter(Boolean).sort()
          .forEach(v=>tSel.innerHTML+=`<option>${v}</option>`);

        [...new Set(all.map(f=>f.properties?.Stav))].filter(Boolean).sort()
          .forEach(v=>sSel.innerHTML+=`<option>${v}</option>`);

        function apply(){
          const typ = tSel.value;
          const sta = sSel.value;
          const srch = norm(txt.value);

          const filtered = all.filter(f=>{
            const p = f.properties || {};
            const mt = !typ || p.Typologie===typ;
            const ms = !sta || p.Stav===sta;
            const text = norm(p["Název projektu"])+" "+norm(p["Kód projektu"]);
            const mq = !srch || text.includes(srch);
            return mt && ms && mq;
          });

          draw(filtered);
        }

        tSel.onchange = apply;
        sSel.onchange = apply;
        txt.oninput = apply;

        clr.onclick = ()=>{
          txt.value = "";
          apply();
          txt.focus();
        };

        rst.onclick = ()=>{
          tSel.value=""; sSel.value=""; txt.value="";
          apply();
        };

        cls.onclick = ()=>filterWindow.classList.remove("open");
      });


    /* ============================================
       OVLÁDÁNÍ PANELU FILTRU
    ============================================ */

    const filterToggle = document.getElementById("filterToggle");
    const filterWindow = document.getElementById("filterWindow");

    filterToggle.onclick = ()=>{
      filterWindow.classList.toggle("open");
    };

  </script>
</body>
</html>
