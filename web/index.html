<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<link rel="stylesheet" href="/CASUA-Map/web/css/leaflet.css">
<link rel="stylesheet" href="/CASUA-Map/web/css/leaflet-search.css">
<link rel="stylesheet" href="/CASUA-Map/web/css/leaflet.photon.css">
<link rel="stylesheet" href="/CASUA-Map/web/css/leaflet-measure.css">

<style>
html, body, #map {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

.leaflet-popup-content {
  margin: 0;
}

.casua-popup {
  width: 420px;
  height: 500px;
  overflow-y: auto;
  padding: 15px;
  box-sizing: border-box;
}

.casua-popup img {
  width: 100%;
  max-height: 260px;
  object-fit: contain;
  border-radius: 6px;
  margin-bottom: 10px;
}

.casua-filter {
  background: white;
  padding: 10px;
  border-radius: 6px;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
  font-size: 13px;
  width: 220px;
}

.casua-filter select,
.casua-filter input {
  width: 100%;
  margin-bottom: 6px;
  box-sizing: border-box;
}
</style>

<title>CASUA Map</title>
</head>
<body>
<div id="map"></div>

<script src="web/js/leaflet.js"></script>
<script src="web/js/leaflet-search.js"></script>

<script>

const POPUP_WIDTH = 420;
const POPUP_HEIGHT = 500;
const IMAGE_MAX_HEIGHT = 260;
const PIN_SIZE = 90;

var map = L.map('map', { maxZoom:28, minZoom:1 })
  .fitBounds([[50.06315,14.40062],[50.14089,14.50308]]);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19
}).addTo(map);

/* ===== LOGO ===== */

const logoControl = L.control({ position: 'bottomleft' });

logoControl.onAdd = function () {
  const div = L.DomUtil.create('div');
  div.innerHTML = `<img src="web/images/logo.png" style="width:140px;">`;
  L.DomEvent.disableClickPropagation(div);
  return div;
};

logoControl.addTo(map);

/* ===== IKONY ===== */

const ICON_FILES = {
  'bydleni': 'pin_bydleni.png',
  'administrativa': 'pin_administrativa.png',
  'kultura': 'pin_kultura.png',
  'zdravotnictvi': 'pin_zdravotnictvi.png',
  'ostatni': 'pin_ostatni.png',
  'polyfunkce': 'pin_polyfunkce.png',
  'prumysl': 'pin_prumysl.png',
  'urbanismus': 'pin_urbanismus.png',
  'vzdelavani': 'pin_vzdelavani.png'
};

const TYPO_TO_KEY = {
  'Bydlení': 'bydleni',
  'Administrativa': 'administrativa',
  'Kultura': 'kultura',
  'Zdravotnictví': 'zdravotnictvi',
  'Ostatní': 'ostatni',
  'Polyfunkce': 'polyfunkce',
  'Průmysl': 'prumysl',
  'Urbanismus a veřejný prostor': 'urbanismus',
  'Vzdělávání': 'vzdelavani'
};

function getIconByTypologie(typologie) {
  const key = TYPO_TO_KEY[typologie] || 'ostatni';
  return L.icon({
    iconUrl: 'web/icons/' + ICON_FILES[key],
    iconSize: [PIN_SIZE, PIN_SIZE],
    iconAnchor: [PIN_SIZE/2, PIN_SIZE/2],
    popupAnchor: [0, -(PIN_SIZE*0.35)]
  });
}

/* ===== POPUP ===== */

function createCasuaPopup(p) {

  function field(label, value) {
    if (!value) return "";
    return `<div style="margin:4px 0;"><strong>${label}:</strong> ${value}</div>`;
  }

  let fotoHtml = "";
  if (p["Obrázek"]) {
    fotoHtml = `<img src="${p["Obrázek"]}">`;
  }

  const popis = p["Popis"] ? p["Popis"].replace(/\n/g,"<br>") : "";

  return `
    <div class="casua-popup">
      <h2 style="margin:0 0 10px 0;">
        ${p["Název projektu"] || ""}
      </h2>
      ${fotoHtml}
      ${field("Kód projektu", p["Kód projektu"])}
      ${field("Lokace", p["Lokace"])}
      ${field("Typologie", p["Typologie"])}
      ${field("Stav", p["Stav"])}
      ${field("Investor", p["Investor"])}
      ${field("Tým", p["Team"])}
      ${field("Zahájení", p["Zahájení"])}
      ${field("Dokončení", p["Dokončení"])}
      ${popis ? `<p style="margin-top:10px;"><strong>Popis:</strong><br>${popis}</p>` : ""}
    </div>
  `;
}

/* ===== DATA + FILTRY ===== */

fetch('data/projekty.geojson?cb=' + Date.now())
  .then(r => r.json())
  .then(geojson => {

    let allFeatures = geojson.features;
    let geoLayer;

    function renderLayer(features) {
      if (geoLayer) map.removeLayer(geoLayer);

      geoLayer = L.geoJSON({
        type: "FeatureCollection",
        features: features
      }, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, {
            icon: getIconByTypologie(feature.properties?.["Typologie"])
          });
        },
        onEachFeature: function(feature, layer) {
          if (feature.properties) {
            layer.bindPopup(createCasuaPopup(feature.properties), {
              maxWidth: POPUP_WIDTH + 40
            });
          }
        }
      }).addTo(map);
    }

    renderLayer(allFeatures);

    const filterControl = L.control({ position: 'topleft' });

    filterControl.onAdd = function () {
      const div = L.DomUtil.create('div', 'casua-filter');
      div.innerHTML = `
        <select id="filterTypologie">
          <option value="">Typologie – vše</option>
        </select>

        <select id="filterStav">
          <option value="">Stav – vše</option>
        </select>

        <input type="text" id="searchText" placeholder="Hledat název / kód">
      `;
      L.DomEvent.disableClickPropagation(div);
      return div;
    };

    filterControl.addTo(map);

    const typSelect = document.getElementById("filterTypologie");
    const stavSelect = document.getElementById("filterStav");
    const searchInput = document.getElementById("searchText");

    const typSet = new Set();
    const stavSet = new Set();

    allFeatures.forEach(f => {
      if (f.properties?.["Typologie"])
        typSet.add(f.properties["Typologie"]);
      if (f.properties?.["Stav"])
        stavSet.add(f.properties["Stav"]);
    });

    [...typSet].sort().forEach(t => {
      typSelect.innerHTML += `<option value="${t}">${t}</option>`;
    });

    [...stavSet].sort().forEach(s => {
      stavSelect.innerHTML += `<option value="${s}">${s}</option>`;
    });

    function applyFilter() {

      const typVal = typSelect.value;
      const stavVal = stavSelect.value;
      const searchVal = searchInput.value.toLowerCase();

      const filtered = allFeatures.filter(f => {

        const p = f.properties || {};

        const matchTyp = !typVal || p["Typologie"] === typVal;
        const matchStav = !stavVal || p["Stav"] === stavVal;

        const text = (
          (p["Název projektu"] || "") + " " +
          (p["Kód projektu"] || "")
        ).toLowerCase();

        const matchSearch = !searchVal || text.includes(searchVal);

        return matchTyp && matchStav && matchSearch;
      });

      renderLayer(filtered);
    }

    typSelect.addEventListener("change", applyFilter);
    stavSelect.addEventListener("change", applyFilter);
    searchInput.addEventListener("input", applyFilter);

    try { map.fitBounds(geoLayer.getBounds()); } catch(e){}

  })
  .catch(err => console.error(err));

</script>
</body>
</html>
