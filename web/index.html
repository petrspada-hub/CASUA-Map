<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
  <link rel="stylesheet" href="css/qgis2web.css">
  <link rel="stylesheet" href="css/fontawesome-all.min.css">
  <link rel="stylesheet" href="css/leaflet-search.css">
  <link rel="stylesheet" href="css/leaflet.photon.css">
  <link rel="stylesheet" href="css/leaflet-measure.css">
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }
  </style>
  <title>CASUA Map</title>
</head>
<body>
<div id="map"></div>

<script src="js/leaflet.js"></script>
<script src="js/leaflet-search.js"></script>
<script src="js/leaflet.photon.js"></script>
<script src="js/leaflet-measure.js"></script>

<script>
var map = L.map('map', {
  zoomControl:true,
  maxZoom:28,
  minZoom:1
}).fitBounds([[50.06315,14.40062],[50.14089,14.50308]]);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

/* ===== IKONY ===== */

const ICON_FILES = {
  'bydleni': 'pin_bydleni.png',
  'administrativa': 'pin_administrativa.png',
  'kultura': 'pin_kultura.png',
  'zdravotnictvi': 'pin_zdravotnictvi.png',
  'ostatni': 'pin_ostatni.png',
  'polyfunkce': 'pin_polyfunkce.png',
  'prumysl': 'pin_prumysl.png',
  'urbanismus': 'pin_urbanismus.png',
  'vzdelavani': 'pin_vzdelavani.png'
};

const TYPO_TO_KEY = {
  'Bydlení': 'bydleni',
  'Administrativa': 'administrativa',
  'Kultura': 'kultura',
  'Zdravotnictví': 'zdravotnictvi',
  'Ostatní': 'ostatni',
  'Polyfunkce': 'polyfunkce',
  'Průmysl': 'prumysl',
  'Urbanismus a veřejný prostor': 'urbanismus',
  'Vzdělávání': 'vzdelavani'
};

function getIconByTypologie(typologie) {
  const key = TYPO_TO_KEY[typologie] || 'ostatni';
  const file = ICON_FILES[key];
  const size = [60, 60];
  return L.icon({
    iconUrl: 'icons/' + file,
    iconSize: size,
    iconAnchor: [30, 30],
    popupAnchor: [0, -20]
  });
}

/* ===== POPUP ===== */

function createCasuaPopup(p) {

  function field(label, value) {
    if (!value) return "";
    return `<div style="margin:4px 0;"><strong>${label}:</strong> ${value}</div>`;
  }

  let fotoHtml = "";
  if (p["Obrázek"]) {
    fotoHtml = `
      <img src="${p["Obrázek"]}" 
           style="width:100%; border-radius:6px; margin-bottom:10px;">
    `;
  }

  const popis = p["Popis"] ? p["Popis"].replace(/\n/g,"<br>") : "";

  return `
    <div style="font-family:Arial; font-size:14px; max-width:420px; line-height:1.45;">
      <h2 style="margin:0 0 10px 0; font-size:20px;">
        ${p["Název projektu"] || ""}
      </h2>
      ${fotoHtml}
      ${field("Kód projektu", p["Kód projektu"])}
      ${field("Lokace", p["Lokace"])}
      ${field("Typologie", p["Typologie"])}
      ${field("Stav", p["Stav"])}
      ${field("Investor", p["Investor"])}
      ${field("Tým", p["Team"])}
      ${field("Zahájení", p["Zahájení"])}
      ${field("Dokončení", p["Dokončení"])}
      ${popis ? `<p style="margin-top:10px;"><strong>Popis:</strong><br>${popis}</p>` : ""}
    </div>
  `;
}

/* ===== DATA ===== */

const DATA_URL = '../data/projekty.geojson?cb=' + Date.now();

fetch(DATA_URL)
  .then(r => r.json())
  .then(geojson => {

    const layer = L.geoJSON(geojson, {

      pointToLayer: function(feature, latlng) {
        const typ = feature.properties?.["Typologie"];
        return L.marker(latlng, {
          icon: getIconByTypologie(typ)
        });
      },

      onEachFeature: function(feature, layer) {
        if (feature.properties) {
          layer.bindPopup(createCasuaPopup(feature.properties));
        }
      }

    }).addTo(map);

    try { map.fitBounds(layer.getBounds()); } catch(e){}

    map.addControl(new L.Control.Search({
      layer: layer,
      propertyName: 'Název projektu',
      hideMarkerOnCollapse: true
    }));

  })
  .catch(err => console.error(err));

</script>
</body>
</html>
