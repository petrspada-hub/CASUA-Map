<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">

  <!-- Vaše existující CSS knihovny -->
  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
  <link rel="stylesheet" href="css/qgis2web.css">
  <link rel="stylesheet" href="css/fontawesome-all.min.css">
  <link rel="stylesheet" href="css/leaflet-search.css">
  <link rel="stylesheet" href="css/leaflet.photon.css">
  <link rel="stylesheet" href="css/leaflet-measure.css">

  <title>CASUA Map</title>

  <!-- Naše drobné doplňkové styly: logo, sloupec tlačítek, panel filtru, panel volby vyhledávání -->
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }

    /* ===== STACK V LEVÉM HORNÍM ROHU ===== */
    .casua-stack {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      pointer-events: none; /* kontejner nebere kliky, jen vnitřní prvky */
    }
    .casua-control {
      pointer-events: auto; /* ovládací prvky bere kliky */
      box-shadow: 0 1px 5px rgba(0,0,0,0.65);
      border-radius: 4px;
      background: #fff;
      margin-bottom: 10px;
    }

    /* Logo blok */
    .casua-logo {
      display: block;
      padding: 6px;
      line-height: 0;
    }
    .casua-logo img {
      display: block;
      width: 120px; /* lze kdykoliv změnit */
      height: auto;
    }
    @media (max-width: 420px) {
      .casua-logo img { width: 96px; }
    }

    /* Sloupec tlačítek ve stylu Leaflet zoom */
    .leaflet-bar.casua-bar a {
      width: 30px;
      height: 30px;
      line-height: 30px;
      display: block;
      text-align: center;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: 18px 18px;
      font-weight: bold;
      color: #333;
    }
    .leaflet-bar.casua-bar a + a {
      border-top: 1px solid #ccc;
    }
    /* Ikony (PNG) */
    .btn-filter { background-image: url('web/images/filter-icon.png'); }
    .btn-search { background-image: url('web/images/search-icon.png'); }

    /* Skryjeme defaultní zoom vlevo nahoře – používáme vlastní tlačítka pod logem */
    .leaflet-top.leaflet-left .leaflet-control-zoom {
      display: none;
    }

    /* ===== PANEL FILTRU ===== */
    .casua-filter-panel {
      position: absolute;
      top: 180px; /* níže pod stackem */
      left: 10px;
      z-index: 1100;
      width: 260px;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.65);
      overflow: hidden;
      display: none;
    }
    .casua-filter-header {
      padding: 8px 10px;
      font-weight: bold;
      background: #f6f6f6;
      border-bottom: 1px solid #ddd;
    }
    .casua-filter-body {
      padding: 10px;
    }
    .casua-filter-body label {
      display: block;
      font-size: 12px;
      color: #333;
      margin: 8px 0 4px;
    }
    .casua-filter-body select,
    .casua-filter-body input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 13px;
    }
    .casua-filter-actions {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #eee;
    }
    .casua-btn {
      flex: 1;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .casua-btn.secondary {
      background: #9e9e9e;
    }

    /* ===== PANEL VOLBY VYHLEDÁVÁNÍ (Projekty / Mapa) ===== */
    .casua-search-chooser {
      position: absolute;
      top: 180px; /* zarovnáno s filtrem */
      left: 10px;
      z-index: 1100;
      display: none;
    }
    .casua-search-chooser .leaflet-bar a {
      width: auto;
      min-width: 84px;
      padding: 0 10px;
      font-weight: 500;
      font-size: 13px;
    }

    /* Photon control skrytý, zobrazujeme na požadavek */
    .leaflet-control-photon {
      display: none;
    }
    .casua-photon-visible .leaflet-control-photon {
      display: block;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- STACK: logo + sloupec tlačítek -->
  <div class="casua-stack">
    <!-- Logo -->
    <div class="casua-control">
      <a class="casua-logo" href="#" title="CASUA">
        <img src="web/images/logo.png" alt="CASUA logo">
      </a>
    </div>

    <!-- Tlačítka: +  −  filtr  hledání -->
    <div class="leaflet-bar casua-bar casua-control" id="casuaButtons">
      <a href="#" id="btnZoomIn" aria-label="Přiblížit" title="Přiblížit">+</a>
      <a href="#" id="btnZoomOut" aria-label="Oddálit"  title="Oddálit">−</a>
      <a href="#" id="btnFilter" class="btn-filter" aria-label="Filtr" title="Filtr"></a>
      <a href="#" id="btnSearch" class="btn-search" aria-label="Vyhledávání" title="Vyhledávání"></a>
    </div>
  </div>

  <!-- PANEL FILTRU -->
  <div class="casua-filter-panel" id="filterPanel" role="dialog" aria-label="Filtr projektů">
    <div class="casua-filter-header">Filtr</div>
    <div class="casua-filter-body">
      <label for="fltTypologie">Typologie</label>
      <select id="fltTypologie">
        <option value="">(vše)</option>
      </select>

      <label for="fltStav">Stav</label>
      <select id="fltStav">
        <option value="">(vše)</option>
      </select>

      <label>Dokončení (od – do)</label>
      <div style="display:flex; gap:8px;">
        <input id="fltDokOd" type="number" placeholder="od roku">
        <input id="fltDokDo" type="number" placeholder="do roku">
      </div>
    </div>
    <div class="casua-filter-actions">
      <button class="casua-btn secondary" id="btnResetFilter">Reset</button>
      <button class="casua-btn" id="btnApplyFilter">Použít</button>
    </div>
  </div>

  <!-- VOLBA VYHLEDÁVÁNÍ -->
  <div class="casua-search-chooser" id="searchChooser">
    <div class="leaflet-bar casua-control">
      <a href="#" id="chooseProj">Projekty</a>
      <a href="#" id="chooseMap">Mapa</a>
    </div>
  </div>

  <!-- Vaše existující JS knihovny -->
  <script src="js/leaflet.js"></script>
  <script src="js/leaflet-search.js"></script>
  <script src="js/leaflet.photon.js"></script>
  <script src="js/leaflet-measure.js"></script>

  <script>
    /* ===== MAPA ===== */
    const map = L.map('map', {
      zoomControl: true,   // necháme kvůli klávesám, viz CSS pro skrytí default UI
      maxZoom: 28,
      minZoom: 1
    }).fitBounds([[50.06315,14.40062],[50.14089,14.50308]]); /* dle původního souboru */ // [1](https://casuasro-my.sharepoint.com/personal/petr_spada_casua_cz/Documents/Soubory%20aplikace%20Microsoft%20Copilot%20Chat/index.html)

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map); // [1](https://casuasro-my.sharepoint.com/personal/petr_spada_casua_cz/Documents/Soubory%20aplikace%20Microsoft%20Copilot%20Chat/index.html)

    /* ===== IKONY PINŮ (oprava fallbacku) ===== */
    const ICON_FILES = { // [1](https://casuasro-my.sharepoint.com/personal/petr_spada_casua_cz/Documents/Soubory%20aplikace%20Microsoft%20Copilot%20Chat/index.html)
      'bydleni': 'pin_bydleni.png',
      'administrativa': 'pin_administrativa.png',
      'kultura': 'pin_kultura.png',
      'zdravotnictvi': 'pin_zdravotnictvi.png',
      'ostatni': 'pin_ostatni.png',
      'polyfunkce': 'pin_polyfunkce.png',
      'prumysl': 'pin_prumysl.png',
      'urbanismus': 'pin_urbanismus.png',
      'vzdelavani': 'pin_vzdelavani.png'
    };
    const TYPO_TO_KEY = { // [1](https://casuasro-my.sharepoint.com/personal/petr_spada_casua_cz/Documents/Soubory%20aplikace%20Microsoft%20Copilot%20Chat/index.html)
      'Bydlení': 'bydleni',
      'Administrativa': 'administrativa',
      'Kultura': 'kultura',
      'Zdravotnictví': 'zdravotnictvi',
      'Ostatní': 'ostatni',
      'Polyfunkce': 'polyfunkce',
      'Průmysl': 'prumysl',
      'Urbanismus a veřejný prostor': 'urbanismus',
      'Vzdělávání': 'vzdelavani'
    };
    function getIconByTypologie(typologie) { // [1](https://casuasro-my.sharepoint.com/personal/petr_spada_casua_cz/Documents/Soubory%20aplikace%20Microsoft%20Copilot%20Chat/index.html)
      const key = TYPO_TO_KEY[typologie] || 'ostatni';
      const file = ICON_FILES[key];
      const size = [60, 60];
      return L.icon({
        iconUrl: 'icons/' + file,
        iconSize: size,
        iconAnchor: [30, 30],
        popupAnchor: [0, -20]
      });
    }

    /* ===== POPUP ===== */
    function createCasuaPopup(p) { // převzato a lehce upraveno z původního souboru  [1](https://casuasro-my.sharepoint.com/personal/petr_spada_casua_cz/Documents/Soubory%20aplikace%20Microsoft%20Copilot%20Chat/index.html)
      function field(label, value) {
        if (!value) return "";
        return `<div style="margin:4px 0;"><strong>${label}:</strong> ${value}</div>`;
      }
      let fotoHtml = "";
      if (p["Obrázek"]) {
        fotoHtml = `
          <img src="${p["Obrázek"]}"
               style="width:100%; border-radius:6px; margin-bottom:10px;">
        `;
      }
      const popis = p["Popis"] ? p["Popis"].replace(/\n/g,"<br>") : "";
      const title = (p["Název projektu"] || "");
      return `
        <div style="font-family:Arial; font-size:14px; max-width:420px; line-height:1.45;">
          <h2 style="margin:0 0 10px 0; font-size:20px;">${title}</h2>
          ${fotoHtml}
          ${field("Kód projektu", p["Kód projektu"])}
          ${field("Lokace", p["Lokace"])}
          ${field("Typologie", p["Typologie"])}
          ${field("Stav", p["Stav"])}
          ${field("Investor", p["Investor"])}
          ${field("Tým", p["Team"])}
          ${field("Zahájení", p["Zahájení"])}
          ${field("Dokončení", p["Dokončení"])}
          ${popis ? `<p style="margin-top:10px;"><strong>Popis:</strong><br>${popis}</p>` : ""}
        </div>
      `;
    }

    /* ===== HELPER: normalizace pro vyhledávání bez diakritiky a case-insensitive ===== */
    function normalizeStr(s) {
      if (!s) return '';
      // NFD + odstranění diakritiky
      try {
        return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      } catch(e) {
        // Fallback pro starší prohlížeče – jen základní české znaky
        const map = {'á':'a','č':'c','ď':'d','é':'e','ě':'e','í':'i','ň':'n','ó':'o','ř':'r','š':'s','ť':'t','ú':'u','ů':'u','ý':'y','ž':'z',
                     'Á':'a','Č':'c','Ď':'d','É':'e','Ě':'e','Í':'i','Ň':'n','Ó':'o','Ř':'r','Š':'s','Ť':'t','Ú':'u','Ů':'u','Ý':'y','Ž':'z'};
        return s.split('').map(ch => map[ch] || ch).join('').toLowerCase();
      }
    }

    /* ===== DATA ===== */
    const DATA_URL = '../data/projekty.geojson?cb=' + Date.now(); // [1](https://casuasro-my.sharepoint.com/personal/petr_spada_casua_cz/Documents/Soubory%20aplikace%20Microsoft%20Copilot%20Chat/index.html)

    // Stav filtrů
    const filterState = {
      typologie: '',
      stav: '',
      dokOd: '',
      dokDo: ''
    };

    // Úložiště pro GEOJSON a aktuální vrstvu
    let geojsonData = null;
    let layer = null;

    // Ovládací prvky
    const btnZoomIn = document.getElementById('btnZoomIn');
    const btnZoomOut = document.getElementById('btnZoomOut');
    const btnFilter = document.getElementById('btnFilter');
    const btnSearch = document.getElementById('btnSearch');
    const filterPanel = document.getElementById('filterPanel');
    const searchChooser = document.getElementById('searchChooser');

    const fltTypologie = document.getElementById('fltTypologie');
    const fltStav = document.getElementById('fltStav');
    const fltDokOd = document.getElementById('fltDokOd');
    const fltDokDo = document.getElementById('fltDokDo');

    const btnApplyFilter = document.getElementById('btnApplyFilter');
    const btnResetFilter = document.getElementById('btnResetFilter');

    const chooseProj = document.getElementById('chooseProj');
    const chooseMap  = document.getElementById('chooseMap');

    // Photon (mapové vyhledávání)
    const photonCtrl = L.control.photon({
      placeholder: 'Hledat v mapě…',
      position: 'topleft',
      noMinWidth: true
    }).addTo(map);

    /* ===== INIT: Načtení dat a vytvoření vrstvy ===== */
    fetch(DATA_URL)
      .then(r => r.json())
      .then(geojson => {
        geojsonData = geojson; // uchovat původní data  // [1](https://casuasro-my.sharepoint.com/personal/petr_spada_casua_cz/Documents/Soubory%20aplikace%20Microsoft%20Copilot%20Chat/index.html)

        // Přidej normalizované jméno a připrav unikátní hodnoty pro selecty
        const setTyp = new Set();
        const setStav = new Set();
        let minDok = Infinity, maxDok = -Infinity;

        for (const f of geojsonData.features) {
          const p = f.properties || {};
          p._NazevNorm = normalizeStr(p['Název projektu'] || '');
          f.properties = p;

          if (p['Typologie']) setTyp.add(p['Typologie']);
          if (p['Stav']) setStav.add(p['Stav']);
          if (p['Dokončení']) {
            const y = parseInt(String(p['Dokončení']).match(/\d{4}/)?.[0] || '', 10);
            if (!isNaN(y)) {
              minDok = Math.min(minDok, y);
              maxDok = Math.max(maxDok, y);
            }
          }
        }

        // Naplň selecty
        [...setTyp].sort().forEach(v => {
          const o = document.createElement('option');
          o.value = v; o.textContent = v;
          fltTypologie.appendChild(o);
        });
        [...setStav].sort().forEach(v => {
          const o = document.createElement('option');
          o.value = v; o.textContent = v;
          fltStav.appendChild(o);
        });
        if (minDok !== Infinity && maxDok !== -Infinity) {
          fltDokOd.placeholder = 'od ' + minDok;
          fltDokDo.placeholder = 'do ' + maxDok;
        }

        // Vytvoř vrstvu poprvé
        buildLayer();

        // Vyhledávání v projektech (bez diakritiky), indexujeme aktuální vrstvu
        initProjectSearch();

        // Pokus o fitBounds (fallback, když je prázdný filtr)
        try { map.fitBounds(layer.getBounds()); } catch(e){}
      })
      .catch(err => console.error(err));

    /* ===== Vytvoření vrstvy s filtrem ===== */
    function buildLayer() {
      if (layer) {
        map.removeLayer(layer);
      }
      layer = L.geoJSON(geojsonData, {
        filter: featureMatchesFilter,
        pointToLayer: function(feature, latlng) {
          const typ = feature.properties?.['Typologie'];
          return L.marker(latlng, { icon: getIconByTypologie(typ) });
        },
        onEachFeature: function(feature, lyr) {
          if (feature.properties) {
            lyr.bindPopup(createCasuaPopup(feature.properties));
          }
        }
      }).addTo(map);
    }

    function featureMatchesFilter(feat) {
      const p = feat.properties || {};
      // Typologie
      if (filterState.typologie && p['Typologie'] !== filterState.typologie) return false;
      // Stav
      if (filterState.stav && p['Stav'] !== filterState.stav) return false;
      // Dokončení (od-do)
      const dok = parseInt(String(p['Dokončení'] || '').match(/\d{4}/)?.[0] || '', 10);
      if (filterState.dokOd && (isNaN(dok) || dok < parseInt(filterState.dokOd,10))) return false;
      if (filterState.dokDo && (isNaN(dok) || dok > parseInt(filterState.dokDo,10))) return false;
      return true;
    }

    /* ===== Vyhledávání PROJEKTŮ (bez diakritiky) =====
       Použijeme sourceData, abychom mohli vlastní porovnání/normalizaci.
    */
    let projectSearch = null;
    function initProjectSearch() {
      if (projectSearch) {
        map.removeControl(projectSearch);
        projectSearch = null;
      }
      projectSearch = new L.Control.Search({
        sourceData: searchSourceData,
        marker: false,
        position: 'topleft',
        textPlaceholder: 'Hledat projekt…',
        moveToLocation: function(latlng, title, map) {
          map.setView(latlng, Math.max(map.getZoom(), 16));
        }
      });
      map.addControl(projectSearch);
    }

    // Vrací objekt { 'Název projektu' : LatLng, ... } pro aktuální zobrazené prvky
    function buildSearchIndex() {
      const dict = {};
      layer.eachLayer(lyr => {
        const f = lyr.feature || {};
        const p = f.properties || {};
        const title = p['Název projektu'];
        if (!title) return;
        dict[title] = lyr.getLatLng();
      });
      return dict;
    }

    function searchSourceData(text, callResponse) {
      const q = normalizeStr(text || '');
      const all = buildSearchIndex();
      const out = {};
      Object.keys(all).forEach(label => {
        if (normalizeStr(label).includes(q)) {
          out[label] = all[label];
        }
      });
      callResponse(out);
      return { // pro plugin
        abort: function() {}
      };
    }

    /* ===== OVLÁDÁNÍ TLAČÍTEK ===== */
    // Zoom
    btnZoomIn.addEventListener('click', e => { e.preventDefault(); map.zoomIn(); });
    btnZoomOut.addEventListener('click', e => { e.preventDefault(); map.zoomOut(); });

    // Filtr – otevři/zavři panel
    btnFilter.addEventListener('click', e => {
      e.preventDefault();
      toggleDisplay(filterPanel);
      // Schovej volbu vyhledávání, aby se nepřekrývalo
      hide(searchChooser);
    });

    // Vyhledávání – nabídni volbu Projekty/Mapa
    btnSearch.addEventListener('click', e => {
      e.preventDefault();
      toggleDisplay(searchChooser);
      // Schovej panel filtru, ať je to přehledné
      hide(filterPanel);
    });

    // Volba "Projekty"
    chooseProj.addEventListener('click', e => {
      e.preventDefault();
      hide(searchChooser);
      // Otevři/zaostři input pluginu
      setTimeout(() => {
        const btn = document.querySelector('.leaflet-control-search .search-button');
        if (btn) btn.click();
        const input = document.querySelector('.leaflet-control-search .search-input');
        if (input) input.focus();
      }, 0);
    });

    // Volba "Mapa"
    chooseMap.addEventListener('click', e => {
      e.preventDefault();
      hide(searchChooser);
      document.body.classList.add('casua-photon-visible');
      // focus do Photonu
      setTimeout(() => {
        const input = document.querySelector('.leaflet-control-photon input[type="search"], .leaflet-control-photon input');
        if (input) input.focus();
      }, 0);
    });

    // Klik mimo Photon pole panel schová
    map.on('click', () => {
      document.body.classList.remove('casua-photon-visible');
    });

    // Aplikovat filtr
    btnApplyFilter.addEventListener('click', e => {
      e.preventDefault();
      filterState.typologie = fltTypologie.value || '';
      filterState.stav = fltStav.value || '';
      filterState.dokOd = fltDokOd.value || '';
      filterState.dokDo = fltDokDo.value || '';
      buildLayer();         // znovu vytvoř vrstvu s novým filtrem
      initProjectSearch();  // reindexuj vyhledávání
      hide(filterPanel);
      try { map.fitBounds(layer.getBounds(), { maxZoom: 17 }); } catch(e){}
    });

    // Reset filtru
    btnResetFilter.addEventListener('click', e => {
      e.preventDefault();
      fltTypologie.value = '';
      fltStav.value = '';
      fltDokOd.value = '';
      fltDokDo.value = '';
      filterState.typologie = '';
      filterState.stav = '';
      filterState.dokOd = '';
      filterState.dokDo = '';
      buildLayer();
      initProjectSearch();
      hide(filterPanel);
      try { map.fitBounds(layer.getBounds()); } catch(e){}
    });

    /* ===== UTIL ===== */
    function toggleDisplay(el) {
      if (!el) return;
      el.style.display = (el.style.display === 'none' || !el.style.display) ? 'block' : 'none';
    }
    function hide(el) {
      if (!el) return;
      el.style.display = 'none';
    }
  </script>
</body>
</html>
