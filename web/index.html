<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<link rel="stylesheet" href="web/css/leaflet.css">
<link rel="stylesheet" href="web/css/leaflet-search.css">
<link rel="stylesheet" href="web/css/leaflet.photon.css">
<link rel="stylesheet" href="web/css/leaflet-measure.css">

<style>
html, body, #map {
 width: 100%;
 height: 100%;
 margin: 0;
 padding: 0;
}

/* Pevný rozměr popupu */
.leaflet-popup-content {
 margin: 0;
}
.casua-popup {
 width: 420px;
 height: 500px;
 overflow-y: auto;
 padding: 15px;
 box-sizing: border-box;
}
.casua-popup img {
 width: 100%;
 max-height: 260px;
 object-fit: contain;
 border-radius: 6px;
 margin-bottom: 10px;
}

/* === NOVÉ: LOGO === */
.map-logo {
    background: rgba(255,255,255,0.8);
    padding: 6px;
    border-radius: 6px;
}
.map-logo img {
    height: 55px;
}

/* === NOVÉ: PANEL FILTRŮ === */
#filterBox {
    background: white;
    padding: 10px;
    width: 230px;
    border-radius: 6px;
    box-shadow: 0 0 6px rgba(0,0,0,0.25);
}
#filterBox label {
    font-size: 13px;
    font-weight: bold;
    margin-top: 5px;
    display: block;
}
#filterBox input,
#filterBox select {
    width: 100%;
    margin: 4px 0 10px 0;
    padding: 4px;
}
</style>

<title>CASUA Map</title>
</head>

<body>

<div id="map"></div>

<!-- === NOVÉ: LOGO vlevo dole === -->
<div class="leaflet-control map-logo leaflet-bottom leaflet-left">
    web/images/logo.png
</div>

<script src="web/js/leaflet.js"></script>
<script src="web/js/leaflet-search.js"></script>

<script>

/* ===== NASTAVITELNÉ PARAMETRY ===== */
const POPUP_WIDTH = 420;
const POPUP_HEIGHT = 500;
const IMAGE_MAX_HEIGHT = 260;
const PIN_SIZE = 90;

/* mapa */
var map = L.map('map', { maxZoom:28, minZoom:1 })
 .fitBounds([[50.06315,14.40062],[50.14089,14.50308]]);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);

/* ===== IKONY ===== */
const ICON_FILES = {
 'bydleni': 'pin_bydleni.png',
 'administrativa': 'pin_administrativa.png',
 'kultura': 'pin_kultura.png',
 'zdravotnictvi': 'pin_zdravotnictvi.png',
 'ostatni': 'pin_ostatni.png',
 'polyfunkce': 'pin_polyfunkce.png',
 'prumysl': 'pin_prumysl.png',
 'urbanismus': 'pin_urbanismus.png',
 'vzdelavani': 'pin_vzdelavani.png'
};

const TYPO_TO_KEY = {
 'Bydlení': 'bydleni',
 'Administrativa': 'administrativa',
 'Kultura': 'kultura',
 'Zdravotnictví': 'zdravotnictvi',
 'Ostatní': 'ostatni',
 'Polyfunkce': 'polyfunkce',
 'Průmysl': 'prumysl',
 'Urbanismus a veřejný prostor': 'urbanismus',
 'Vzdělávání': 'vzdelavani'
};

function getIconByTypologie(typologie) {
 const key = TYPO_TO_KEY[typologie] || 'ostatni';
 return L.icon({
     iconUrl: 'icons/' + ICON_FILES[key],
     iconSize: [PIN_SIZE, PIN_SIZE],
     iconAnchor: [PIN_SIZE/2, PIN_SIZE/2],
     popupAnchor: [0, -(PIN_SIZE*0.35)]
 });
}

/* ===== POPUP ===== */
function createCasuaPopup(p) {

 function field(label, value) {
     if (!value) return "";
     return `<div style="margin:4px 0;"><strong>${label}:</strong> ${value}</div>`;
 }

 let fotoHtml = "";
 if (p["Obrázek"]) {
     fotoHtml = `${p[`;
 }

 const popis = p["Popis"] ? p["Popis"].replace(/\n/g,"<br>") : "";

 return `
 <div class="casua-popup">
     <h2 style="margin:0 0 10px 0;">${p["Název projektu"] || ""}</h2>
     ${fotoHtml}
     ${field("Kód projektu", p["Kód projektu"])}
     ${field("Lokace", p["Lokace"])}
     ${field("Typologie", p["Typologie"])}
     ${field("Stav", p["Stav"])}
     ${field("Investor", p["Investor"])}
     ${field("Tým", p["Team"])}
     ${field("Zahájení", p["Zahájení"])}
     ${field("Dokončení", p["Dokončení"])}
     ${popis ? `<p><strong>Popis:</strong><br>${popis}</p>` : ""}
 </div>`;
}

/* === NOVÉ: FILTR PANEL === */
const filterControl = L.control({position: "topleft"});
filterControl.onAdd = function() {
    const div = L.DomUtil.create("div", "");
    div.id = "filterBox";
    div.innerHTML = `
        <label>Vyhledat:</label>
        <input id="searchInput" placeholder="název nebo kód">

        <label>Typologie:</label>
        <select id="filterTypologie">
            <option value="">Vše</option>
            <option>Bydlení</option>
            <option>Administrativa</option>
            <option>Kultura</option>
            <option>Zdravotnictví</option>
            <option>Ostatní</option>
            <option>Polyfunkce</option>
            <option>Průmysl</option>
            <option>Urbanismus a veřejný prostor</option>
            <option>Vzdělávání</option>
        </select>

        <label>Stav:</label>
        <select id="filterStav">
            <option value="">Vše</option>
            <option>Studie</option>
            <option>Probíhá</option>
            <option>Dokončeno</option>
            <option>Realizace</option>
        </select>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
filterControl.addTo(map);

/* === NOVÉ: FILTR LOGIKA === */
let allFeatures = [];
let activeLayerGroup = L.layerGroup().addTo(map);

function renderMarkers() {
    activeLayerGroup.clearLayers();

    const txt = document.getElementById("searchInput").value.toLowerCase();
    const typ = document.getElementById("filterTypologie").value;
    const stav = document.getElementById("filterStav").value;

    allFeatures.forEach(f => {
        const p = f.properties;

        const matchSearch =
            (p["Název projektu"] || "").toLowerCase().includes(txt) ||
            (p["Kód projektu"] || "").toLowerCase().includes(txt);

        const matchTyp = typ === "" || p["Typologie"] === typ;
        const matchStav = stav === "" || p["Stav"] === stav;

        if (matchSearch && matchTyp && matchStav) {
            const m = L.marker(f.latlng, {
                icon: getIconByTypologie(p["Typologie"])
            });
            m.bindPopup(createCasuaPopup(p));
            m.addTo(activeLayerGroup);
        }
    });
}

/* ===== DATA ===== */
fetch('data/projekty.geojson?cb=' + Date.now())
 .then(r => r.json())
 .then(geojson => {

    geojson.features.forEach(f => {
        if (f.geometry?.coordinates) {
            allFeatures.push({
                properties: f.properties,
                latlng: L.latLng(
                    f.geometry.coordinates[1],
                    f.geometry.coordinates[0]
                )
            });
        }
    });

    renderMarkers();
 });

document.getElementById("searchInput").oninput = renderMarkers;
document.getElementById("filterTypologie").onchange = renderMarkers;
document.getElementById("filterStav").onchange = renderMarkers;

</script>

</body>
</html>
