name: Aktualizace CSV z OneDrive/SharePoint

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Stáhnout CSV z OneDrive/SharePoint
        run: |
          curl -L "https://casuasro-my.sharepoint.com/:x:/g/personal/petr_spada_casua_cz/IQBKnD_JZuU8RL2--3HnERzuASMIXXa_GAGngN4nzjTutrE?e=x3WACw" -o data/projekty.csv

      - name: Commit CSV do repozitáře
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add data/projekty.csv
          git commit -m "Automatická aktualizace CSV z OneDrive" || echo "Žádné změny"
          git push
