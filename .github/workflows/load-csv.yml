name: load-csv

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CSV from OneDrive
        run: |
          curl -L "https://casuasro-my.sharepoint.com/:x:/g/personal/petr_spada_casua_cz/IQBKnD_JZuU8RL2--3HnERzuASMIXXa_GAGngN4nzjTutrE?e=x3WACw" -o data/projekty.csv

      - name: Commit CSV
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add data/projekty.csv
          git commit -m "Update CSV" || echo "No changes to commit"
          git push
