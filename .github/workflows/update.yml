name: Update GeoJSON from CSV

on:
  push:
    paths:
      - 'data/projekty.csv'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    container: osgeo/gdal:ubuntu-small-latest

    steps:
      - uses: actions/checkout@v4

      - name: Convert CSV → GeoJSON
        run: |
          ogr2ogr -f GeoJSON \
            data/projekty.geojson \
            data/projekty.csv \
            -oo SEPARATOR=SEMICOLON \
            -oo X_POSSIBLE_NAMES=Longitude \
            -oo Y_POSSIBLE_NAMES=Latitude \
            -oo KEEP_GEOM_COLUMNS=NO \
            -a_srs EPSG:4326

      - name: Commit and push GeoJSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/projekty.geojson
          git commit -m "Auto: GeoJSON updated from CSV" || echo "no changes"
          git push
